<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#0066FF" />
    <title>TapIn Admin</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-app">
      <header class="topbar">
        <h1>TapIn Admin</h1>
        <a class="ghost-btn link-btn" href="./index.html">打卡頁</a>
      </header>

      <section id="login-panel" class="admin-card">
        <h2>管理者登入</h2>
        <form id="login-form" class="admin-form">
          <label>
            帳號
            <input id="username-input" type="text" autocomplete="username" required />
          </label>
          <label>
            密碼
            <input id="password-input" type="password" autocomplete="current-password" required />
          </label>
          <button id="login-btn" type="submit" class="primary-btn">登入</button>
        </form>
      </section>

      <section id="dashboard-panel" class="admin-card" hidden>
        <div class="admin-headline">
          <h2>系統設定</h2>
          <button id="logout-btn" type="button" class="ghost-btn">登出</button>
        </div>

        <form id="config-form" class="admin-form">
          <label>
            Google Sheet ID
            <input id="spreadsheet-id-input" type="text" required />
          </label>
          <label>
            辦公室固定 IP
            <input id="office-ip-input" type="text" required />
          </label>
          <label>
            打卡 Log Sheet 名稱
            <input id="log-sheet-name-input" type="text" required />
          </label>
          <label>
            Device 綁定 Sheet 名稱
            <input id="binding-sheet-name-input" type="text" required />
          </label>
          <label>
            GPS 精度上限（公尺）
            <input id="max-gps-input" type="number" min="1" required />
          </label>
          <label>
            請假 Sheet 名稱
            <input id="leave-sheet-name-input" type="text" required />
          </label>
          <button id="save-config-btn" type="submit" class="primary-btn">儲存設定</button>
        </form>

        <div class="log-tools">
          <h2>打卡紀錄</h2>
          <div class="log-actions">
            <select id="limit-select">
              <option value="20">最近 20 筆</option>
              <option value="50" selected>最近 50 筆</option>
              <option value="100">最近 100 筆</option>
              <option value="200">最近 200 筆</option>
            </select>
            <button id="reload-logs-btn" type="button" class="ghost-btn">重新整理</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>時間</th>
                <th>員工</th>
                <th>裝置 UUID</th>
                <th>IP</th>
                <th>地點</th>
                <th>緯度</th>
                <th>經度</th>
              </tr>
            </thead>
            <tbody id="logs-body"></tbody>
          </table>
        </div>

        <div class="log-tools">
          <h2>請假審核</h2>
          <div class="log-actions">
            <select id="leave-status-select">
              <option value="pending">待審核</option>
              <option value="all">全部</option>
              <option value="approved">已批准</option>
              <option value="rejected">已拒絕</option>
            </select>
            <button id="reload-leave-btn" type="button" class="ghost-btn">重新整理</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>申請 ID</th>
                <th>員工</th>
                <th>假別</th>
                <th>開始日期</th>
                <th>結束日期</th>
                <th>原因</th>
                <th>狀態</th>
                <th>送出時間</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="leave-body"></tbody>
          </table>
        </div>

        <div class="log-tools">
          <h2>請假日曆</h2>
          <div class="log-actions cal-nav-actions">
            <button id="admin-cal-prev" class="ghost-btn" type="button">‹ 上月</button>
            <select id="admin-cal-year"></select>
            <select id="admin-cal-month"></select>
            <button id="admin-cal-next" class="ghost-btn" type="button">下月 ›</button>
          </div>
        </div>
        <div id="admin-cal-wrap" class="cal-wrap"></div>
      </section>

      <section class="admin-card status-card">
        <p id="admin-status" class="status">等待操作</p>
        <p id="admin-result" class="result"></p>
      </section>
    </main>

    <script src="./config.js" defer></script>
    <script src="./admin.js" defer></script>
  </body>
</html>
